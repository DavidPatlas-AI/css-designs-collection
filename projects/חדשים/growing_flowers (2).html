<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פרחים גדלים</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        .container {
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .garden {
            width: 400px;
            height: 300px;
            position: relative;
            margin: 20px auto;
            background: transparent;
        }

        .flower {
            position: absolute;
            bottom: 0;
            transform-origin: bottom center;
            opacity: 0;
        }

        .flower.animate {
            animation: growFlower 3s ease-out forwards;
        }

        @keyframes growFlower {
            0% {
                opacity: 1;
                transform: scaleY(0) scaleX(0.8);
            }
            50% {
                transform: scaleY(0.7) scaleX(0.9);
            }
            100% {
                opacity: 1;
                transform: scaleY(1) scaleX(1);
            }
        }

        .stem {
            width: 6px;
            height: 120px;
            background: linear-gradient(to top, #2d5016, #4a7c59);
            border-radius: 3px;
            position: relative;
            margin: 0 auto;
        }

        .leaf {
            position: absolute;
            width: 20px;
            height: 12px;
            background: linear-gradient(45deg, #4a7c59, #6fa876);
            border-radius: 0 100% 0 100%;
            transform-origin: left center;
        }

        .leaf.left {
            left: -15px;
            top: 60px;
            transform: rotate(-45deg);
        }

        .leaf.right {
            right: -15px;
            top: 80px;
            transform: rotate(45deg);
        }

        .flower-head {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
        }

        .petal {
            position: absolute;
            width: 20px;
            height: 20px;
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            border-radius: 50% 50% 50% 0;
            transform-origin: bottom left;
            box-shadow: 0 2px 8px rgba(255, 215, 0, 0.3);
        }

        .petal:nth-child(1) { transform: rotate(0deg) translate(15px, 15px); }
        .petal:nth-child(2) { transform: rotate(72deg) translate(15px, 15px); }
        .petal:nth-child(3) { transform: rotate(144deg) translate(15px, 15px); }
        .petal:nth-child(4) { transform: rotate(216deg) translate(15px, 15px); }
        .petal:nth-child(5) { transform: rotate(288deg) translate(15px, 15px); }

        .center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            background: radial-gradient(circle, #ff8c00, #ff6b00);
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(255, 140, 0, 0.6);
        }

        .flower1 { left: 50px; animation-delay: 0s; }
        .flower2 { left: 175px; animation-delay: 0.5s; }
        .flower3 { left: 300px; animation-delay: 1s; }

        .message {
            color: white;
            font-size: 24px;
            margin-bottom: 30px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            opacity: 0;
            transform: translateY(20px);
        }

        .message.show {
            animation: fadeInUp 1s ease-out forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn {
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            transform: translateY(0);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: translateY(0);
        }

        .floating-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ffd700;
            border-radius: 50%;
            opacity: 0;
        }

        .particle.animate {
            animation: floatUp 3s ease-out forwards;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) scale(0);
            }
        }

        /* Back button styles */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 170, 255, 0.9);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 600;
            transition: all 0.3s ease;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .back-btn:hover {
            background: rgba(0, 170, 255, 1);
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 170, 255, 0.4);
        }
    </style>
</head>
<body>
    <a href="../../gallery.html" class="back-btn">← חזרה לבית</a>
    
    <div class="stars"></div>
    
    <div class="container">
        <div class="message" id="message">
            זה בשבילך! 💕
        </div>
        
        <div class="garden" id="garden">
            <div class="flower flower1">
                <div class="stem">
                    <div class="leaf left"></div>
                    <div class="leaf right"></div>
                </div>
                <div class="flower-head">
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="center"></div>
                </div>
            </div>
            
            <div class="flower flower2">
                <div class="stem">
                    <div class="leaf left"></div>
                    <div class="leaf right"></div>
                </div>
                <div class="flower-head">
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="center"></div>
                </div>
            </div>
            
            <div class="flower flower3">
                <div class="stem">
                    <div class="leaf left"></div>
                    <div class="leaf right"></div>
                </div>
                <div class="flower-head">
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="center"></div>
                </div>
            </div>
        </div>
        
        <button class="btn" id="growBtn">לחץ כאן! 🌸</button>
        
        <div class="floating-particles" id="particles"></div>
    </div>

    <script>
        // יצירת כוכבים
        function createStars() {
            const starsContainer = document.querySelector('.stars');
            const numStars = 50;
            
            for (let i = 0; i < numStars; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = star.style.height = (Math.random() * 3 + 1) + 'px';
                star.style.animationDelay = Math.random() * 2 + 's';
                star.style.animationDuration = (Math.random() * 3 + 1) + 's';
                starsContainer.appendChild(star);
            }
        }

        // יצירת חלקיקים מרחפים
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const numParticles = 15;
            
            for (let i = 0; i < numParticles; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.className = 'particle animate';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.bottom = '0px';
                    particle.style.animationDelay = Math.random() * 2 + 's';
                    particlesContainer.appendChild(particle);
                    
                    setTimeout(() => {
                        particle.remove();
                    }, 3000);
                }, i * 200);
            }
        }

        // הפעלת האנימציה
        function growFlowers() {
            const flowers = document.querySelectorAll('.flower');
            const message = document.getElementById('message');
            const btn = document.getElementById('growBtn');
            
            btn.disabled = true;
            btn.textContent = 'הפרחים גדלים...';
            
            message.classList.add('show');
            
            flowers.forEach((flower, index) => {
                setTimeout(() => {
                    flower.classList.add('animate');
                }, index * 500);
            });
            
            createParticles();
            
            setTimeout(() => {
                btn.textContent = 'צמח שוב! 🌺';
                btn.disabled = false;
            }, 3000);
        }

        // איפוס האנימציה
        function resetAnimation() {
            const flowers = document.querySelectorAll('.flower');
            const message = document.getElementById('message');
            
            flowers.forEach(flower => {
                flower.classList.remove('animate');
            });
            
            message.classList.remove('show');
        }

        // אתחול
        document.addEventListener('DOMContentLoaded', function() {
            createStars();
            
            const growBtn = document.getElementById('growBtn');
            growBtn.addEventListener('click', function() {
                resetAnimation();
                setTimeout(growFlowers, 100);
            });
        });
    </script>
</body>
</html>
