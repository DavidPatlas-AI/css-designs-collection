<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אנימציית רדאר מתקדמת</title>
    <style>
        :root {
            --primary-green: #00ff41;
            --primary-red: #ff4444;
            --primary-blue: #4488ff;
            --dark-bg: #0a0a0a;
            --radar-bg: #001100;
            --grid-color: #003300;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, var(--dark-bg), #1a1a2e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--primary-green);
            overflow: hidden;
        }

        .radar-container {
            position: relative;
            width: 400px;
            height: 400px;
            margin: 20px;
            padding: 20px;
            background: radial-gradient(circle, #001a00 0%, var(--dark-bg) 100%);
            border-radius: 50%;
            box-shadow: 
                0 0 50px rgba(0, 255, 65, 0.3),
                inset 0 0 50px rgba(0, 255, 65, 0.1);
            border: 2px solid var(--primary-green);
        }

        .radar-screen {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, var(--radar-bg) 0%, var(--dark-bg) 100%);
            overflow: hidden;
        }

        .radar-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-image: 
                radial-gradient(circle, transparent 24%, var(--grid-color) 25%, var(--grid-color) 26%, transparent 27%),
                radial-gradient(circle, transparent 49%, var(--grid-color) 50%, var(--grid-color) 51%, transparent 52%),
                radial-gradient(circle, transparent 74%, var(--grid-color) 75%, var(--grid-color) 76%, transparent 77%);
        }

        .radar-grid::before {
            content: '';
            position: absolute;
            width: 2px;
            height: 100%;
            background: var(--grid-color);
            left: 50%;
            transform: translateX(-50%);
        }

        .radar-grid::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--grid-color);
            top: 50%;
            transform: translateY(-50%);
        }

        .radar-sweep {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                transparent 270deg,
                rgba(0, 255, 65, 0.8) 300deg,
                rgba(0, 255, 65, 0.4) 330deg,
                rgba(0, 255, 65, 0.1) 360deg
            );
            animation: radar-sweep 3s linear infinite;
            transform-origin: center;
        }

        .radar-sweep.mode-2 {
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                transparent 270deg,
                rgba(255, 68, 68, 0.8) 300deg,
                rgba(255, 68, 68, 0.4) 330deg,
                rgba(255, 68, 68, 0.1) 360deg
            );
        }

        .radar-sweep.mode-3 {
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                transparent 270deg,
                rgba(68, 136, 255, 0.8) 300deg,
                rgba(68, 136, 255, 0.4) 330deg,
                rgba(68, 136, 255, 0.1) 360deg
            );
            animation: radar-sweep 1.5s linear infinite;
        }

        @keyframes radar-sweep {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .radar-targets {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        .target {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary-red);
            box-shadow: 0 0 10px var(--primary-red);
            opacity: 0;
            animation: target-blink 2s ease-in-out infinite;
        }

        .target.active {
            opacity: 1;
            animation: target-pulse 1s ease-in-out infinite;
        }

        @keyframes target-blink {
            0%, 90% { opacity: 0; }
            95%, 100% { opacity: 1; }
        }

        @keyframes target-pulse {
            0%, 100% { 
                transform: scale(1);
                opacity: 1;
            }
            50% { 
                transform: scale(1.5);
                opacity: 0.7;
            }
        }

        .radar-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            background: var(--primary-green);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px var(--primary-green);
            animation: center-pulse 2s ease-in-out infinite;
        }

        @keyframes center-pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.3); }
        }

        .controls {
            display: flex;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-btn {
            background: rgba(0, 255, 65, 0.1);
            border: 2px solid var(--primary-green);
            color: var(--primary-green);
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .control-btn:hover {
            background: rgba(0, 255, 65, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.4);
            transform: translateY(-2px);
        }

        .control-btn.active {
            background: var(--primary-green);
            color: var(--dark-bg);
            box-shadow: 0 0 25px var(--primary-green);
        }

        .info-panel {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--primary-green);
            border-radius: 10px;
            padding: 20px;
            margin: 20px;
            backdrop-filter: blur(10px);
            max-width: 400px;
            text-align: center;
        }

        .info-panel h3 {
            margin-bottom: 10px;
            color: var(--primary-green);
            text-shadow: 0 0 10px var(--primary-green);
        }

        .info-panel p {
            line-height: 1.6;
            opacity: 0.9;
        }

        .radar-status {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 12px;
            border-radius: 5px;
            border: 1px solid var(--primary-green);
            font-size: 12px;
            font-weight: bold;
        }

        .scan-lines {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 8px,
                rgba(0, 255, 65, 0.03) 9px,
                rgba(0, 255, 65, 0.03) 10px
            );
            animation: scan-lines 0.1s linear infinite;
        }

        @keyframes scan-lines {
            0% { transform: translateY(0); }
            100% { transform: translateY(10px); }
        }

        .target-info {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid var(--primary-green);
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 10px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .target-info.show {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .radar-container {
                width: 300px;
                height: 300px;
                margin: 10px;
            }
            
            .controls {
                margin: 20px 0;
            }
            
            .control-btn {
                padding: 10px 20px;
                font-size: 12px;
            }
        }

        /* Back button styles */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 170, 255, 0.9);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 600;
            transition: all 0.3s ease;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .back-btn:hover {
            background: rgba(0, 170, 255, 1);
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 170, 255, 0.4);
        }
    </style>
</head>
<body>
    <a href="../../gallery.html" class="back-btn">← חזרה לבית</a>
    
    <div class="info-panel">
        <h3>מערכת רדאר מתקדמת</h3>
        <p>בחר מצב סריקה ועקב אחר יעדים בזמן אמת</p>
    </div>

    <div class="radar-container">
        <div class="radar-status" id="radarStatus">מצב 1 - סריקה סטנדרטית</div>
        <div class="radar-screen">
            <div class="scan-lines"></div>
            <div class="radar-grid"></div>
            <div class="radar-sweep" id="radarSweep"></div>
            <div class="radar-targets" id="radarTargets"></div>
            <div class="radar-center"></div>
        </div>
    </div>

    <div class="controls">
        <button class="control-btn active" onclick="setMode(1)">מצב 1 - סטנדרטי</button>
        <button class="control-btn" onclick="setMode(2)">מצב 2 - אזהרה</button>
        <button class="control-btn" onclick="setMode(3)">מצב 3 - מהיר</button>
        <button class="control-btn" onclick="toggleTargets()">הוסף יעדים</button>
        <button class="control-btn" onclick="clearTargets()">נקה יעדים</button>
    </div>

    <script>
        let currentMode = 1;
        let targets = [];
        let targetCount = 0;
        let showTargets = false;
        
        const radarSweep = document.getElementById('radarSweep');
        const radarTargets = document.getElementById('radarTargets');
        const radarStatus = document.getElementById('radarStatus');
        
        function setMode(mode) {
            currentMode = mode;
            
            // עדכון כפתורים
            document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // עדכון מראה הרדאר
            radarSweep.className = 'radar-sweep';
            if (mode === 2) {
                radarSweep.classList.add('mode-2');
                radarStatus.textContent = 'מצב 2 - אזהרה אדומה';
                radarStatus.style.color = '#ff4444';
                radarStatus.style.borderColor = '#ff4444';
            } else if (mode === 3) {
                radarSweep.classList.add('mode-3');
                radarStatus.textContent = 'מצב 3 - סריקה מהירה';
                radarStatus.style.color = '#4488ff';
                radarStatus.style.borderColor = '#4488ff';
            } else {
                radarStatus.textContent = 'מצב 1 - סריקה סטנדרטית';
                radarStatus.style.color = '#00ff41';
                radarStatus.style.borderColor = '#00ff41';
            }
        }
        
        function createTarget(x, y) {
            const target = document.createElement('div');
            target.className = 'target';
            target.style.left = x + 'px';
            target.style.top = y + 'px';
            
            // הוספת מידע על היעד
            const targetInfo = document.createElement('div');
            targetInfo.className = 'target-info';
            targetInfo.textContent = `יעד ${++targetCount}`;
            targetInfo.style.left = (x + 15) + 'px';
            targetInfo.style.top = (y - 20) + 'px';
            
            target.addEventListener('mouseenter', () => {
                targetInfo.classList.add('show');
            });
            
            target.addEventListener('mouseleave', () => {
                targetInfo.classList.remove('show');
            });
            
            radarTargets.appendChild(target);
            radarTargets.appendChild(targetInfo);
            
            targets.push({ element: target, info: targetInfo });
            
            // הפעלת אנימציית היעד
            setTimeout(() => {
                target.classList.add('active');
            }, Math.random() * 2000);
        }
        
        function toggleTargets() {
            if (showTargets) {
                clearTargets();
                event.target.textContent = 'הוסף יעדים';
            } else {
                addRandomTargets();
                event.target.textContent = 'הסתר יעדים';
            }
            showTargets = !showTargets;
        }
        
        function addRandomTargets() {
            const targetPositions = [
                {x: 100, y: 80},
                {x: 250, y: 150},
                {x: 180, y: 220},
                {x: 320, y: 180},
                {x: 80, y: 200},
                {x: 200, y: 100},
                {x: 300, y: 250}
            ];
            
            targetPositions.forEach((pos, index) => {
                setTimeout(() => {
                    createTarget(pos.x, pos.y);
                }, index * 500);
            });
        }
        
        function clearTargets() {
            targets.forEach(target => {
                target.element.remove();
                target.info.remove();
            });
            targets = [];
            targetCount = 0;
            showTargets = false;
            
            // עדכון טקסט הכפתור
            const toggleBtn = document.querySelector('.control-btn:nth-child(4)');
            if (toggleBtn) {
                toggleBtn.textContent = 'הוסף יעדים';
            }
        }
        
        // הוספת יעדים על ידי לחיצה על המסך
        document.querySelector('.radar-screen').addEventListener('click', function(e) {
            if (e.target === this || e.target.classList.contains('radar-grid') || 
                e.target.classList.contains('scan-lines')) {
                const rect = this.getBoundingClientRect();
                const x = e.clientX - rect.left - 4; // התאמה לגודל היעד
                const y = e.clientY - rect.top - 4;
                
                // בדיקה שהיעד בתוך המעגל
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const distance = Math.sqrt(Math.pow(x - centerX, 2) + Math.pow(y - centerY, 2));
                
                if (distance < centerX - 10) {
                    createTarget(x, y);
                }
            }
        });
        
        // אפקט קול (אופציונלי)
        function playRadarSound() {
            if ('speechSynthesis' in window) {
                // יצירת צליל דמוי רדאר
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(200, audioContext.currentTime + 0.1);
                
                gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.1);
            }
        }
        
        // הפעלת צליל כל סיבוב רדאר (אופציונלי)
        // setInterval(playRadarSound, 3000);
    </script>
</body>
</html>
