<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אנימציית טעינה תלת-מימדית</title>
    <style>
        :root {
            --primary-color: #ff6b35;
            --secondary-color: #f7931e;
            --accent-color: #ffcc02;
            --dark-bg: #0a0a0a;
            --light-bg: #1a1a1a;
            --glow-color: #ff6b35;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, var(--dark-bg), var(--light-bg));
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .title {
            color: #ffffff;
            font-size: 2.5rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 107, 53, 0.5);
            animation: titlePulse 3s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }

        .loader-container {
            position: relative;
            width: 200px;
            height: 200px;
            perspective: 1000px;
        }

        .loader {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            animation: rotate3d 3s linear infinite;
        }

        @keyframes rotate3d {
            0% { transform: rotateY(0deg) rotateX(0deg); }
            25% { transform: rotateY(90deg) rotateX(0deg); }
            50% { transform: rotateY(180deg) rotateX(180deg); }
            75% { transform: rotateY(270deg) rotateX(180deg); }
            100% { transform: rotateY(360deg) rotateX(360deg); }
        }

        .ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid transparent;
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                var(--primary-color) 60deg,
                var(--secondary-color) 120deg,
                var(--accent-color) 180deg,
                var(--primary-color) 240deg,
                transparent 300deg,
                transparent 360deg
            );
            animation: ringPulse 2s ease-in-out infinite alternate;
            box-shadow: 
                0 0 30px rgba(255, 107, 53, 0.6),
                inset 0 0 30px rgba(255, 107, 53, 0.3);
        }

        @keyframes ringPulse {
            0% { 
                transform: scale(1) rotateZ(0deg);
                filter: brightness(1) blur(0px);
            }
            100% { 
                transform: scale(1.1) rotateZ(180deg);
                filter: brightness(1.3) blur(1px);
            }
        }

        .ring:nth-child(2) {
            animation-delay: 0.5s;
            transform: rotateX(60deg);
            background: conic-gradient(
                from 120deg,
                transparent 0deg,
                var(--secondary-color) 60deg,
                var(--accent-color) 120deg,
                var(--primary-color) 180deg,
                var(--secondary-color) 240deg,
                transparent 300deg,
                transparent 360deg
            );
        }

        .ring:nth-child(3) {
            animation-delay: 1s;
            transform: rotateY(60deg);
            background: conic-gradient(
                from 240deg,
                transparent 0deg,
                var(--accent-color) 60deg,
                var(--primary-color) 120deg,
                var(--secondary-color) 180deg,
                var(--accent-color) 240deg,
                transparent 300deg,
                transparent 360deg
            );
        }

        .inner-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, var(--primary-color), var(--secondary-color));
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 
                0 0 40px var(--glow-color),
                inset 0 0 20px rgba(255, 255, 255, 0.3);
            animation: innerPulse 1.5s ease-in-out infinite;
        }

        @keyframes innerPulse {
            0%, 100% { 
                transform: translate(-50%, -50%) scale(1);
                box-shadow: 0 0 40px var(--glow-color), inset 0 0 20px rgba(255, 255, 255, 0.3);
            }
            50% { 
                transform: translate(-50%, -50%) scale(1.2);
                box-shadow: 0 0 60px var(--glow-color), inset 0 0 30px rgba(255, 255, 255, 0.5);
            }
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent-color);
            border-radius: 50%;
            opacity: 0;
            animation: particleFloat 3s linear infinite;
        }

        @keyframes particleFloat {
            0% {
                opacity: 0;
                transform: translateY(100px) scale(0);
            }
            20% {
                opacity: 1;
                transform: translateY(80px) scale(1);
            }
            80% {
                opacity: 1;
                transform: translateY(-80px) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) scale(0);
            }
        }

        .loading-text {
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: textFade 2s ease-in-out infinite;
            text-shadow: 0 0 10px rgba(255, 107, 53, 0.5);
        }

        @keyframes textFade {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .progress-bar {
            width: 300px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color), var(--accent-color));
            border-radius: 2px;
            animation: progressFill 4s ease-in-out infinite;
            box-shadow: 0 0 10px var(--glow-color);
        }

        @keyframes progressFill {
            0% { width: 0%; }
            50% { width: 100%; }
            100% { width: 0%; }
        }

        .controls {
            position: absolute;
            bottom: 50px;
            display: flex;
            gap: 20px;
        }

        .control-btn {
            background: rgba(255, 107, 53, 0.2);
            border: 2px solid var(--primary-color);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .control-btn:hover {
            background: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 107, 53, 0.3);
        }

        .control-btn.active {
            background: var(--primary-color);
            box-shadow: 0 0 20px var(--primary-color);
        }

        .background-effects {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: 
                radial-gradient(circle at 20% 20%, rgba(255, 107, 53, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(247, 147, 30, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(255, 204, 2, 0.05) 0%, transparent 50%);
            animation: backgroundShift 10s ease-in-out infinite;
        }

        @keyframes backgroundShift {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(180deg); }
        }

        .loader-variant-2 {
            animation: rotate3dVariant2 4s linear infinite;
        }

        @keyframes rotate3dVariant2 {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            33% { transform: rotateX(120deg) rotateY(0deg) rotateZ(0deg); }
            66% { transform: rotateX(120deg) rotateY(120deg) rotateZ(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg); }
        }

        .loader-variant-3 {
            animation: rotate3dVariant3 2s ease-in-out infinite alternate;
        }

        @keyframes rotate3dVariant3 {
            0% { transform: rotateX(-30deg) rotateY(0deg); }
            100% { transform: rotateX(30deg) rotateY(360deg); }
        }

        @media (max-width: 768px) {
            .title {
                font-size: 2rem;
            }
            
            .loader-container {
                width: 150px;
                height: 150px;
            }
            
            .progress-bar {
                width: 250px;
            }
            
            .controls {
                bottom: 30px;
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .control-btn {
                padding: 10px 20px;
                font-size: 12px;
            }
        }

        /* Back button styles */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 170, 255, 0.9);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 600;
            transition: all 0.3s ease;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .back-btn:hover {
            background: rgba(0, 170, 255, 1);
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 170, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="background-effects"></div>
    
    <div class="container">
        <h1 class="title">Loader תלת מימדי</h1>
        
        <div class="loader-container">
            <div class="loader" id="loader">
                <div class="ring"></div>
                <div class="ring"></div>
                <div class="ring"></div>
                <div class="inner-circle"></div>
            </div>
            
            <div class="particles" id="particles"></div>
        </div>
        
        <div class="loading-text" id="loadingText">טוען...</div>
        
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
    </div>
    
    <div class="controls">
        <button class="control-btn active" onclick="setVariant(1)">מצב 1</button>
        <button class="control-btn" onclick="setVariant(2)">מצב 2</button>
        <button class="control-btn" onclick="setVariant(3)">מצב 3</button>
        <button class="control-btn" onclick="toggleParticles()">חלקיקים</button>
    </div>

    <a href="../../gallery.html" class="back-btn">← חזרה לגלריה</a>

    <script>
        let currentVariant = 1;
        let particlesEnabled = true;
        let particleInterval;
        
        const loader = document.getElementById('loader');
        const loadingText = document.getElementById('loadingText');
        const particles = document.getElementById('particles');
        
        const loadingTexts = [
            'טוען...',
            'עובד...',
            'מעבד...',
            'מתחבר...',
            'כמעט מוכן...'
        ];
        
        function setVariant(variant) {
            currentVariant = variant;
            
            // עדכון כפתורים
            document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // איפוס מחלקות
            loader.className = 'loader';
            
            // החלת מצב חדש
            switch(variant) {
                case 1:
                    // מצב ברירת מחדל
                    break;
                case 2:
                    loader.classList.add('loader-variant-2');
                    break;
                case 3:
                    loader.classList.add('loader-variant-3');
                    break;
            }
        }
        
        function toggleParticles() {
            particlesEnabled = !particlesEnabled;
            
            if (particlesEnabled) {
                startParticles();
                event.target.textContent = 'הסתר חלקיקים';
            } else {
                stopParticles();
                event.target.textContent = 'הצג חלקיקים';
            }
        }
        
        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            // מיקום אקראי סביב הטבעת
            const angle = Math.random() * 360;
            const radius = 100 + Math.random() * 50;
            const x = Math.cos(angle * Math.PI / 180) * radius;
            const y = Math.sin(angle * Math.PI / 180) * radius;
            
            particle.style.left = `calc(50% + ${x}px)`;
            particle.style.top = `calc(50% + ${y}px)`;
            particle.style.animationDelay = Math.random() * 2 + 's';
            
            particles.appendChild(particle);
            
            setTimeout(() => {
                if (particle.parentNode) {
                    particle.parentNode.removeChild(particle);
                }
            }, 3000);
        }
        
        function startParticles() {
            if (!particleInterval) {
                particleInterval = setInterval(createParticle, 200);
            }
        }
        
        function stopParticles() {
            if (particleInterval) {
                clearInterval(particleInterval);
                particleInterval = null;
            }
            // ניקוי חלקיקים קיימים
            particles.innerHTML = '';
        }
        
        function updateLoadingText() {
            const randomText = loadingTexts[Math.floor(Math.random() * loadingTexts.length)];
            loadingText.textContent = randomText;
        }
        
        // התחלת חלקיקים
        startParticles();
        
        // עדכון טקסט טעינה
        setInterval(updateLoadingText, 3000);
        
        // אנימציית כניסה
        setTimeout(() => {
            document.querySelector('.container').style.animation = 'fadeInUp 1s ease-out';
        }, 100);
        
        // הוספת אנימציות CSS נוספות
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateY(30px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            
            .container {
                animation: fadeInUp 1s ease-out;
            }
        `;
        document.head.appendChild(style);
        
        // אפקטים נוספים עם עכבר
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            
            document.querySelector('.background-effects').style.background = `
                radial-gradient(circle at ${x}% ${y}%, rgba(255, 107, 53, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(247, 147, 30, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(255, 204, 2, 0.05) 0%, transparent 50%)
            `;
        });
    </script>
</body>
</html>
