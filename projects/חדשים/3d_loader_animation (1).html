<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loader צבאי תלת מימדי</title>
    <style>
        :root {
            --military-green: #2d4a2b;
            --tactical-orange: #ff4500;
            --desert-tan: #d2b48c;
            --night-vision: #00ff00;
            --metal-gray: #4a4a4a;
            --camo-dark: #1a2a1a;
            --warning-red: #dc2626;
            --status-blue: #0066cc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: 
                radial-gradient(circle at 20% 80%, rgba(45, 74, 43, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(26, 42, 26, 0.1) 0%, transparent 50%),
                linear-gradient(135deg, #0a0a0a 0%, #1a2a1a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        /* רקע צבאי */
        .military-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(
                    45deg,
                    transparent,
                    transparent 2px,
                    rgba(45, 74, 43, 0.03) 2px,
                    rgba(45, 74, 43, 0.03) 4px
                );
            pointer-events: none;
        }

        .container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            max-width: 100vw;
            z-index: 10;
        }

        .title {
            color: var(--night-vision);
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 
                0 0 10px var(--night-vision),
                0 0 20px rgba(0, 255, 0, 0.3);
            animation: militaryGlow 2s ease-in-out infinite alternate;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @keyframes militaryGlow {
            0% { 
                text-shadow: 0 0 10px var(--night-vision), 0 0 20px rgba(0, 255, 0, 0.3);
                filter: brightness(1);
            }
            100% { 
                text-shadow: 0 0 15px var(--night-vision), 0 0 30px rgba(0, 255, 0, 0.5);
                filter: brightness(1.2);
            }
        }

        .mission-status {
            color: var(--tactical-orange);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            animation: statusBlink 1.5s infinite;
        }

        @keyframes statusBlink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.6; }
        }

        .loader-container {
            position: relative;
            width: clamp(150px, 25vw, 200px);
            height: clamp(150px, 25vw, 200px);
            perspective: 1000px;
        }

        .radar-frame {
            position: absolute;
            width: 110%;
            height: 110%;
            top: -5%;
            left: -5%;
            border: 2px solid var(--military-green);
            border-radius: 50%;
            background: 
                radial-gradient(circle, transparent 45%, rgba(45, 74, 43, 0.1) 50%),
                conic-gradient(from 0deg, transparent 0deg, var(--military-green) 1deg, transparent 2deg);
            animation: radarSweep 3s linear infinite;
        }

        @keyframes radarSweep {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            animation: militaryRotate 4s linear infinite;
        }

        @keyframes militaryRotate {
            0% { transform: rotateY(0deg) rotateX(15deg); }
            25% { transform: rotateY(90deg) rotateX(15deg); }
            50% { transform: rotateY(180deg) rotateX(-15deg); }
            75% { transform: rotateY(270deg) rotateX(-15deg); }
            100% { transform: rotateY(360deg) rotateX(15deg); }
        }

        .tactical-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid transparent;
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                var(--tactical-orange) 30deg,
                var(--night-vision) 60deg,
                var(--warning-red) 90deg,
                transparent 120deg,
                var(--desert-tan) 150deg,
                transparent 180deg
            );
            animation: tacticalPulse 2s ease-in-out infinite alternate;
            box-shadow: 
                0 0 20px rgba(255, 69, 0, 0.4),
                inset 0 0 20px rgba(0, 0, 0, 0.3);
        }

        @keyframes tacticalPulse {
            0% { 
                transform: scale(1) rotateZ(0deg);
                filter: brightness(1) saturate(1);
            }
            100% { 
                transform: scale(1.05) rotateZ(120deg);
                filter: brightness(1.3) saturate(1.2);
            }
        }

        .tactical-ring:nth-child(2) {
            animation-delay: 0.7s;
            transform: rotateX(60deg);
            background: conic-gradient(
                from 90deg,
                transparent 0deg,
                var(--night-vision) 30deg,
                var(--warning-red) 60deg,
                var(--tactical-orange) 90deg,
                transparent 120deg,
                var(--metal-gray) 150deg,
                transparent 180deg
            );
            border-width: 4px;
        }

        .tactical-ring:nth-child(3) {
            animation-delay: 1.4s;
            transform: rotateY(60deg);
            background: conic-gradient(
                from 180deg,
                transparent 0deg,
                var(--warning-red) 30deg,
                var(--desert-tan) 60deg,
                var(--night-vision) 90deg,
                transparent 120deg,
                var(--tactical-orange) 150deg,
                transparent 180deg
            );
            border-width: 3px;
        }

        .command-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            background: 
                radial-gradient(circle, var(--night-vision), var(--military-green)),
                linear-gradient(45deg, transparent 30%, rgba(255, 255, 255, 0.1) 50%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid var(--tactical-orange);
            box-shadow: 
                0 0 30px var(--night-vision),
                inset 0 0 15px rgba(255, 255, 255, 0.2);
            animation: commandPulse 1s ease-in-out infinite;
        }

        @keyframes commandPulse {
            0%, 100% { 
                transform: translate(-50%, -50%) scale(1);
                box-shadow: 0 0 30px var(--night-vision), inset 0 0 15px rgba(255, 255, 255, 0.2);
            }
            50% { 
                transform: translate(-50%, -50%) scale(1.1);
                box-shadow: 0 0 40px var(--night-vision), inset 0 0 20px rgba(255, 255, 255, 0.3);
            }
        }

        .coordinates {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--night-vision);
            font-size: 0.7rem;
            font-family: 'Courier New', monospace;
            opacity: 0.8;
        }

        .tactical-display {
            color: var(--desert-tan);
            font-size: clamp(0.8rem, 2vw, 1rem);
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
            text-transform: uppercase;
            animation: displayFlicker 3s ease-in-out infinite;
            text-align: center;
        }

        @keyframes displayFlicker {
            0%, 90%, 100% { opacity: 1; }
            91%, 99% { opacity: 0.7; }
        }

        .mission-progress {
            width: min(300px, 80vw);
            height: 6px;
            background: rgba(45, 74, 43, 0.3);
            border-radius: 3px;
            overflow: hidden;
            border: 1px solid var(--military-green);
            position: relative;
        }

        .progress-tactical {
            height: 100%;
            background: linear-gradient(90deg, 
                var(--night-vision) 0%, 
                var(--tactical-orange) 50%, 
                var(--warning-red) 100%);
            border-radius: 3px;
            animation: missionProgress 5s ease-in-out infinite;
            box-shadow: 0 0 10px var(--night-vision);
        }

        @keyframes missionProgress {
            0% { width: 0%; transform: translateX(-100%); }
            50% { width: 100%; transform: translateX(0%); }
            100% { width: 0%; transform: translateX(100%); }
        }

        .control-panel {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        .tactical-btn {
            background: linear-gradient(145deg, var(--military-green), var(--camo-dark));
            border: 2px solid var(--tactical-orange);
            color: var(--night-vision);
            padding: clamp(8px, 2vw, 12px) clamp(16px, 4vw, 20px);
            border-radius: 4px;
            cursor: pointer;
            font-size: clamp(0.7rem, 1.5vw, 0.9rem);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .tactical-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .tactical-btn:hover::before {
            left: 100%;
        }

        .tactical-btn:hover {
            background: linear-gradient(145deg, var(--tactical-orange), var(--warning-red));
            color: #000;
            transform: translateY(-2px);
            box-shadow: 
                0 5px 15px rgba(255, 69, 0, 0.4),
                0 0 20px rgba(0, 255, 0, 0.2);
        }

        .tactical-btn.active {
            background: linear-gradient(145deg, var(--night-vision), var(--tactical-orange));
            color: #000;
            box-shadow: 0 0 15px var(--night-vision);
        }

        .status-indicators {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .status-light {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            position: relative;
            animation: statusPulse 1.5s ease-in-out infinite;
        }

        .status-light.green { background: var(--night-vision); }
        .status-light.orange { background: var(--tactical-orange); }
        .status-light.red { background: var(--warning-red); }

        @keyframes statusPulse {
            0%, 100% { 
                box-shadow: 0 0 5px currentColor;
                transform: scale(1);
            }
            50% { 
                box-shadow: 0 0 15px currentColor;
                transform: scale(1.2);
            }
        }

        /* תיקון לקטנות מסך */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            .container {
                gap: 20px;
                width: 100%;
            }
            
            .control-panel {
                gap: 10px;
            }
            
            .tactical-btn {
                min-width: 0;
                flex: 1;
                max-width: calc(50% - 5px);
            }
            
            .status-indicators {
                gap: 15px;
            }
        }

        @media (max-height: 600px) {
            .container {
                gap: 15px;
            }
            
            .title {
                margin-bottom: 5px;
            }
            
            .mission-status {
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <a href="../../gallery.html" class="back-btn">← חזרה לבית</a>
    
    <div class="military-bg"></div>
    
    <div class="container">
        <h1 class="title">מערכת לוחמה דיגיטלית</h1>
        <div class="mission-status" id="missionStatus">◄ MISSION ACTIVE ►</div>
        
        <div class="loader-container">
            <div class="coordinates" id="coordinates">34°46'N 32°04'E</div>
            <div class="radar-frame"></div>
            <div class="loader" id="tacticalLoader">
                <div class="tactical-ring"></div>
                <div class="tactical-ring"></div>
                <div class="tactical-ring"></div>
                <div class="command-center"></div>
            </div>
        </div>
        
        <div class="tactical-display" id="tacticalDisplay">מערכת ניווט פעילה</div>
        
        <div class="mission-progress">
            <div class="progress-tactical"></div>
        </div>
        
        <div class="status-indicators">
            <div class="status-light green" title="GPS Active"></div>
            <div class="status-light orange" title="Radar Scanning"></div>
            <div class="status-light red" title="Mission Critical"></div>
        </div>
        
        <div class="control-panel">
            <button class="tactical-btn active" onclick="setTacticalMode(1)">מצב צבאי</button>
            <button class="tactical-btn" onclick="setTacticalMode(2)">מצב קרבי</button>
            <button class="tactical-btn" onclick="setTacticalMode(3)">מצב סמוי</button>
            <button class="tactical-btn" onclick="toggleRadar()">רדאר</button>
        </div>
    </div>

    <script>
        let currentMode = 1;
        let radarEnabled = true;
        
        const loader = document.getElementById('tacticalLoader');
        const tacticalDisplay = document.getElementById('tacticalDisplay');
        const missionStatus = document.getElementById('missionStatus');
        const coordinates = document.getElementById('coordinates');
        
        const tacticalMessages = [
            'מערכת ניווט פעילה',
            'סריקת רדאר בתהליך',
            'זיהוי יעדים...',
            'מעדכן קואורדינטות',
            'מצב כוננות גבוהה',
            'מערכת הגנה מופעלת'
        ];
        
        const missionStatuses = [
            '◄ MISSION ACTIVE ►',
            '◄ SCANNING SECTOR ►',
            '◄ TARGET ACQUIRED ►',
            '◄ STANDBY MODE ►'
        ];
        
        function setTacticalMode(mode) {
            currentMode = mode;
            
            // עדכון כפתורים
            document.querySelectorAll('.tactical-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // איפוס מחלקות
            loader.className = 'loader';
            
            // החלת מצב חדש
            switch(mode) {
                case 1:
                    loader.style.animationDuration = '4s';
                    break;
                case 2:
                    loader.style.animationDuration = '2s';
                    loader.style.animationDirection = 'reverse';
                    break;
                case 3:
                    loader.style.animationDuration = '6s';
                    loader.style.animationTimingFunction = 'ease-in-out';
                    break;
            }
        }
        
        function toggleRadar() {
            radarEnabled = !radarEnabled;
            const radarFrame = document.querySelector('.radar-frame');
            
            if (radarEnabled) {
                radarFrame.style.display = 'block';
                event.target.textContent = 'רדאר OFF';
            } else {
                radarFrame.style.display = 'none';
                event.target.textContent = 'רדאר ON';
            }
        }
        
        function updateTacticalDisplay() {
            const randomMessage = tacticalMessages[Math.floor(Math.random() * tacticalMessages.length)];
            tacticalDisplay.textContent = randomMessage;
        }
        
        function updateMissionStatus() {
            const randomStatus = missionStatuses[Math.floor(Math.random() * missionStatuses.length)];
            missionStatus.textContent = randomStatus;
        }
        
        function updateCoordinates() {
            const lat = (34 + Math.random() * 2).toFixed(2);
            const lon = (32 + Math.random() * 2).toFixed(2);
            coordinates.textContent = `${lat}°N ${lon}°E`;
        }
        
        // עדכונים אוטומטיים
        setInterval(updateTacticalDisplay, 3000);
        setInterval(updateMissionStatus, 4000);
        setInterval(updateCoordinates, 5000);
        
        // אנימציית כניסה
        setTimeout(() => {
            document.querySelector('.container').style.opacity = '1';
            document.querySelector('.container').style.transform = 'translateY(0)';
        }, 100);
        
        // הוספת אפקט התחלה
        document.querySelector('.container').style.opacity = '0';
        document.querySelector('.container').style.transform = 'translateY(20px)';
        document.querySelector('.container').style.transition = 'all 1s ease-out';
    </script>
</body>
</html>
