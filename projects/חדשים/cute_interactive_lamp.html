<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מנורה חמודה ואינטראקטיבית</title>
    <style>
        :root {
            --lamp-color: #8a7ca8;
            --lamp-light: #fff3a0;
            --base-color: #6d6d6d;
            --cord-color: #333;
            --bg-dark: #2c3e50;
            --bg-light: #34495e;
            --warm-glow: #ffeb3b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark), var(--bg-light));
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .title {
            color: #ecf0f1;
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: titleGlow 3s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            from { text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
            to { text-shadow: 0 0 20px rgba(255,255,255,0.5), 2px 2px 4px rgba(0,0,0,0.3); }
        }

        .lamp-container {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .lamp-container:hover {
            transform: scale(1.05);
        }

        .lamp {
            position: relative;
            width: 200px;
            height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            z-index: 10;
        }

        .lamp-shade {
            width: 140px;
            height: 120px;
            background: var(--lamp-color);
            border-radius: 0 0 70px 70px;
            position: relative;
            border: 3px solid #6d5b7b;
            box-shadow: 
                0 10px 20px rgba(0,0,0,0.3),
                inset 0 -5px 10px rgba(0,0,0,0.2);
            transition: all 0.4s ease;
            overflow: hidden;
        }

        .lamp-shade.on {
            background: linear-gradient(135deg, #b39ddb, #9575cd);
            box-shadow: 
                0 0 30px var(--warm-glow),
                0 10px 20px rgba(0,0,0,0.2),
                inset 0 -5px 10px rgba(255,255,255,0.1);
        }

        .lamp-face {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 5;
        }

        .eyes {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }

        .eye {
            width: 12px;
            height: 12px;
            background: #2c3e50;
            border-radius: 50%;
            transition: all 0.3s ease;
            position: relative;
        }

        .eye.sleeping {
            height: 3px;
            border-radius: 10px;
            background: #34495e;
            margin-top: 4px;
        }

        .eye.happy {
            transform: rotate(45deg);
            border-radius: 0;
            background: none;
            border-bottom: 3px solid #2c3e50;
            border-right: 3px solid #2c3e50;
            width: 10px;
            height: 10px;
        }

        .eye.surprised {
            width: 16px;
            height: 16px;
            background: #2c3e50;
        }

        .eye.wink {
            height: 3px;
            border-radius: 10px;
            background: #34495e;
            margin-top: 4px;
        }

        .eye.wink:first-child {
            width: 12px;
            height: 12px;
            background: #2c3e50;
            border-radius: 50%;
            margin-top: 0;
        }

        .mouth {
            width: 20px;
            height: 10px;
            border: 3px solid #2c3e50;
            border-top: none;
            border-radius: 0 0 20px 20px;
            transition: all 0.3s ease;
            margin-top: 5px;
        }

        .mouth.happy {
            width: 25px;
            height: 15px;
            border-color: #e74c3c;
        }

        .mouth.sleeping {
            width: 8px;
            height: 8px;
            border: 2px solid #34495e;
            border-radius: 50%;
            border-top: 2px solid #34495e;
        }

        .mouth.surprised {
            width: 15px;
            height: 15px;
            border: 3px solid #2c3e50;
            border-radius: 50%;
        }

        .lamp-light {
            position: absolute;
            bottom: -5px;
            width: 120px;
            height: 40px;
            background: radial-gradient(ellipse, var(--lamp-light) 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0;
            transition: all 0.4s ease;
            filter: blur(2px);
        }

        .lamp-light.on {
            opacity: 0.8;
            transform: scaleY(1.5);
            animation: lightFlicker 2s ease-in-out infinite alternate;
        }

        @keyframes lightFlicker {
            0%, 100% { opacity: 0.8; transform: scaleY(1.5); }
            50% { opacity: 0.9; transform: scaleY(1.6); }
        }

        .lamp-pole {
            width: 8px;
            height: 120px;
            background: linear-gradient(90deg, var(--base-color), #888);
            border-radius: 4px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.3);
            position: relative;
        }

        .lamp-base {
            width: 80px;
            height: 20px;
            background: radial-gradient(ellipse, var(--base-color), #555);
            border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            position: relative;
        }

        .cord {
            position: absolute;
            width: 4px;
            height: 60px;
            background: var(--cord-color);
            border-radius: 2px;
            bottom: 10px;
            left: 38px;
            transform-origin: top;
            animation: cordSway 3s ease-in-out infinite alternate;
        }

        @keyframes cordSway {
            from { transform: rotate(-2deg); }
            to { transform: rotate(2deg); }
        }

        .room-glow {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center 40%, var(--warm-glow) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .room-glow.on {
            opacity: 0.1;
        }

        .controls {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-btn {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            text-transform: uppercase;
        }

        .control-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .control-btn.active {
            background: var(--warm-glow);
            color: #2c3e50;
            border-color: var(--warm-glow);
        }

        .info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
        }

        .floating-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--warm-glow);
            border-radius: 50%;
            opacity: 0;
            animation: float 4s linear infinite;
        }

        @keyframes float {
            0% {
                opacity: 0;
                transform: translateY(100vh) scale(0);
            }
            10% {
                opacity: 1;
                transform: scale(1);
            }
            90% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(-10vh) scale(0);
            }
        }

        .mood-indicator {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #ecf0f1;
            opacity: 0;
            transition: opacity 0.3s ease;
            white-space: nowrap;
        }

        .mood-indicator.show {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .title {
                font-size: 2rem;
                margin-bottom: 20px;
            }
            
            .lamp {
                width: 150px;
                height: 250px;
            }
            
            .lamp-shade {
                width: 110px;
                height: 100px;
            }
            
            .controls {
                margin-top: 30px;
            }
            
            .control-btn {
                padding: 10px 16px;
                font-size: 12px;
            }
        }

        /* Back button styles */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 170, 255, 0.9);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 600;
            transition: all 0.3s ease;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .back-btn:hover {
            background: rgba(0, 170, 255, 1);
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 170, 255, 0.4);
        }
    </style>
</head>
<body>
    <a href="../../gallery.html" class="back-btn">← חזרה לבית</a>
    <div class="floating-particles" id="particles"></div>
    <div class="room-glow" id="roomGlow"></div>
    
    <div class="info-panel">
        <div>💡 לחץ על המנורה להדלקה/כיבוי</div>
        <div>😊 השתמש בכפתורים לשינוי מצב רוח</div>
    </div>
    
    <h1 class="title">מנורה חמודה</h1>
    
    <div class="lamp-container" id="lampContainer" onclick="toggleLamp()">
        <div class="mood-indicator" id="moodIndicator">שמח!</div>
        <div class="lamp" id="lamp">
            <div class="lamp-shade" id="lampShade">
                <div class="lamp-face">
                    <div class="eyes">
                        <div class="eye" id="leftEye"></div>
                        <div class="eye" id="rightEye"></div>
                    </div>
                    <div class="mouth" id="mouth"></div>
                </div>
                <div class="lamp-light" id="lampLight"></div>
            </div>
            <div class="lamp-pole"></div>
            <div class="lamp-base">
                <div class="cord"></div>
            </div>
        </div>
    </div>
    
    <div class="controls">
        <button class="control-btn active" onclick="setMood('happy')">😊 שמח</button>
        <button class="control-btn" onclick="setMood('sleeping')">😴 ישנוני</button>
        <button class="control-btn" onclick="setMood('surprised')">😮 מופתע</button>
        <button class="control-btn" onclick="setMood('wink')">😉 קורץ</button>
        <button class="control-btn" onclick="setMood('neutral')">😐 ניטרלי</button>
    </div>

    <script>
        let isOn = false;
        let currentMood = 'happy';
        let particleInterval;
        
        const lampShade = document.getElementById('lampShade');
        const lampLight = document.getElementById('lampLight');
        const roomGlow = document.getElementById('roomGlow');
        const leftEye = document.getElementById('leftEye');
        const rightEye = document.getElementById('rightEye');
        const mouth = document.getElementById('mouth');
        const moodIndicator = document.getElementById('moodIndicator');
        const particles = document.getElementById('particles');
        
        function toggleLamp() {
            isOn = !isOn;
            
            if (isOn) {
                lampShade.classList.add('on');
                lampLight.classList.add('on');
                roomGlow.classList.add('on');
                startParticles();
                showMoodMessage('מואר ושמח! ✨');
            } else {
                lampShade.classList.remove('on');
                lampLight.classList.remove('on');
                roomGlow.classList.remove('on');
                stopParticles();
                if (currentMood !== 'sleeping') {
                    showMoodMessage('חושך... 🌙');
                }
            }
            
            // אנימציית לחיצה
            lampShade.style.transform = 'scale(0.95)';
            setTimeout(() => {
                lampShade.style.transform = 'scale(1)';
            }, 150);
        }
        
        function setMood(mood) {
            currentMood = mood;
            
            // עדכון כפתורים
            document.querySelectorAll('.control-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // איפוס מחלקות
            leftEye.className = 'eye';
            rightEye.className = 'eye';
            mouth.className = 'mouth';
            
            switch(mood) {
                case 'happy':
                    leftEye.classList.add('happy');
                    rightEye.classList.add('happy');
                    mouth.classList.add('happy');
                    showMoodMessage('שמח! 😊');
                    break;
                    
                case 'sleeping':
                    leftEye.classList.add('sleeping');
                    rightEye.classList.add('sleeping');
                    mouth.classList.add('sleeping');
                    showMoodMessage('ישנוני... 😴');
                    // כיבוי אוטומטי במצב שינה
                    if (isOn) {
                        setTimeout(() => toggleLamp(), 1000);
                    }
                    break;
                    
                case 'surprised':
                    leftEye.classList.add('surprised');
                    rightEye.classList.add('surprised');
                    mouth.classList.add('surprised');
                    showMoodMessage('מופתע! 😮');
                    break;
                    
                case 'wink':
                    leftEye.classList.add('wink');
                    rightEye.classList.add('wink');
                    showMoodMessage('קורץ! 😉');
                    break;
                    
                case 'neutral':
                    showMoodMessage('ניטרלי 😐');
                    break;
            }
        }
        
        function showMoodMessage(message) {
            moodIndicator.textContent = message;
            moodIndicator.classList.add('show');
            
            setTimeout(() => {
                moodIndicator.classList.remove('show');
            }, 2000);
        }
        
        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 2 + 's';
            particle.style.animationDuration = (3 + Math.random() * 2) + 's';
            
            particles.appendChild(particle);
            
            setTimeout(() => {
                if (particle.parentNode) {
                    particle.parentNode.removeChild(particle);
                }
            }, 5000);
        }
        
        function startParticles() {
            particleInterval = setInterval(createParticle, 300);
        }
        
        function stopParticles() {
            if (particleInterval) {
                clearInterval(particleInterval);
            }
        }
        
        // אנימציית מצמוץ אקראית
        setInterval(() => {
            if (currentMood === 'neutral' || currentMood === 'happy') {
                leftEye.style.transform = 'scaleY(0.1)';
                rightEye.style.transform = 'scaleY(0.1)';
                
                setTimeout(() => {
                    leftEye.style.transform = 'scaleY(1)';
                    rightEye.style.transform = 'scaleY(1)';
                }, 150);
            }
        }, 3000 + Math.random() * 4000);
        
        // אינטראקציה עם מקלדת
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                toggleLamp();
            }
        });
        
        // הודעת ברוכים הבאים
        setTimeout(() => {
            showMoodMessage('שלום! לחץ עליי! 👋');
        }, 1000);
    </script>
</body>
</html>
